
# Nom de l'application (visible dans les logs)
spring.application.name=LibraryManager

# Port sur lequel tourne le serveur (par défaut 8080)
server.port=8081

# - DB_CLOSE_DELAY=-1 = la base reste ouverte tant que l'app tourne
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Pilote JDBC pour H2
spring.datasource.driver-class-name=org.h2.Driver

# Identifiants de la base de données H2 (valeurs par défaut)
spring.datasource.username=sa
spring.datasource.password=

#  JPA / HIBERNATE

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true

# Chemin d'accès à la console
spring.h2.console.path=/h2-console

# ─────────────────────────────────────────
#  SÉCURITÉ JWT
# ─────────────────────────────────────────

# Clé secrète pour signer les tokens JWT.
# IMPORTANT EN PRODUCTION : utiliser une clé forte et la stocker
# dans une variable d'environnement, jamais en dur dans le code !
# Cette clé doit faire au moins 256 bits (32 caractères) pour HS256.
app.jwt.secret=LibraryManagerSecretKeyForJWTTokenSigningMustBe256BitsLong!

# Durée de validité du token JWT en millisecondes
# 86400000 ms = 24 heures
app.jwt.expiration=86400000

# ─────────────────────────────────────────
#  LOGGING
# ─────────────────────────────────────────

# Niveau de log pour notre application (DEBUG = très verbeux, utile pour apprendre)
logging.level.fr.amu.librarymanager=DEBUG

# Niveau de log pour Spring Security (pour voir ce qui se passe avec l'auth)
logging.level.org.springframework.security=DEBUG

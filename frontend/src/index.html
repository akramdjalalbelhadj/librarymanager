<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>LibraryManager — Bibliothèque Universitaire</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!--
    Google Fonts — Police Roboto (recommandée pour les interfaces Material/modernes)
    Chargée depuis un CDN, pas besoin de l'installer manuellement.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!--
    Google Material Icons — Bibliothèque d'icônes de Google
    Permet d'utiliser des icônes facilement avec : <span class="material-icons">search</span>
  -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <!--
    app-root : c'est ici que Angular injecte l'application.
    Le composant AppComponent est chargé en premier,
    et il contient le router-outlet qui affiche les pages selon l'URL.
  -->
  <app-root></app-root>
</body>
</html>
